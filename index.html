<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner — Boards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-body w-screen min-h-screen m-0 p-0">

    <header class="dash-header">
        <div class="dash-header-inner">
            <div class="dash-brand">
                <span class="dash-pin"></span>
                <h1 class="dash-title">The Boards</h1>
                <span class="dash-subtitle">case files &amp; corkboards</span>
            </div>
            <div class="dash-account">
                <div id="userInfo" class="dash-user-chip">Connecting...</div>
                <button id="googleSignInBtn" class="btn-paper hidden">Sign in with Google</button>
                <button id="signOutBtn" class="btn-ghost hidden">Sign Out</button>
            </div>
        </div>
    </header>

    <main class="dash-main">
        <div class="dash-toolbar">
            <p class="dash-toolbar-label">Pin a new case to the board</p>
            <button id="createBoardBtn" disabled class="btn-create">+ New Board</button>
        </div>

        <div id="boardsGrid" class="boards-grid"></div>

        <div id="emptyState" class="hidden empty-state">
            <div class="empty-state-pin"></div>
            <p class="empty-state-title">The board is bare.</p>
            <p class="empty-state-sub">Click <strong>+ New Board</strong> to pin your first case.</p>
        </div>
    </main>

    <div id="create-board-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center">
        <div class="create-modal-card">
            <p class="create-modal-label">Name this board</p>
            <input id="create-board-input" type="text" maxlength="60" placeholder="e.g. The Hollow Pines Case" class="create-modal-input" />
            <div class="create-modal-actions">
                <button id="create-board-cancel" class="btn-ghost">Cancel</button>
                <button id="create-board-confirm" class="btn-create">Pin it</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
