<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner — Boards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dashboard-body w-screen min-h-screen m-0 p-0">

    <div class="max-w-5xl mx-auto px-6 py-8">
        <div id="controls" class="flex flex-wrap items-center justify-between gap-4 bg-gray-800/80 backdrop-blur-sm text-white p-4 rounded-lg shadow-2xl border border-gray-600 mb-8">
            <h1 class="text-3xl text-yellow-300">My Boards</h1>
            <div class="flex items-center gap-3">
                <div id="userInfo" class="text-xs text-center bg-gray-700 p-2 rounded-md break-all" style="font-family: 'Kalam', cursive;">Connecting...</div>
                <button id="googleSignInBtn" class="px-4 py-2 bg-white text-gray-800 font-bold rounded-md hover:bg-gray-200 transition-transform transform hover:scale-105 shadow-lg hidden" style="font-family: 'Kalam', cursive;">Sign in with Google</button>
                <button id="signOutBtn" class="px-4 py-2 bg-gray-500 text-white font-bold rounded-md hover:bg-gray-600 transition-transform transform hover:scale-105 shadow-lg hidden" style="font-family: 'Kalam', cursive;">Sign Out</button>
                <button id="createBoardBtn" disabled class="px-4 py-2 bg-yellow-400 text-gray-900 font-bold rounded-md hover:bg-yellow-500 transition-transform transform hover:scale-105 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed" style="font-family: 'Kalam', cursive;">+ Create Board</button>
            </div>
        </div>

        <div id="boardsGrid" class="boards-grid" style="font-family: 'Kalam', cursive;"></div>

        <div id="emptyState" class="hidden text-center text-gray-300 mt-16" style="font-family: 'Kalam', cursive;">
            <p class="text-2xl mb-2">No boards yet.</p>
            <p>Click <strong>+ Create Board</strong> to make your first one.</p>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
