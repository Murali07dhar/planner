<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas — Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="w-screen h-screen m-0 p-0">
    <div id="board" class="w-full h-full">
        <div id="pan-container">
            <svg id="connections-svg"></svg>
        </div>
    </div>
    <div id="controls" class="absolute top-4 left-4 z-20 controls-panel flex flex-col space-y-2">
        <div class="controls-header">
            <button id="backToDashboardBtn" class="back-link">&larr; Boards</button>
            <h1 id="boardTitleDisplay" class="controls-title">Loading…</h1>
        </div>
        <div id="userInfo" class="user-chip">Connecting...</div>
        <button id="googleSignInBtn" class="btn-primary hidden">Sign in with Google</button>
        <button id="signOutBtn" class="btn-secondary hidden">Sign out</button>
        <div class="controls-divider"></div>
        <button id="addNoteBtn" class="btn-secondary cursor-grab">Add note</button>
        <button id="connectModeBtn" class="btn-secondary">Connect notes</button>
        <button id="deleteConnectionBtn" class="btn-secondary">Remove connection</button>
        <button id="deleteModeBtn" class="btn-secondary">Delete note</button>
        <div class="controls-divider"></div>
        <button id="toggleThemeBtn" class="btn-ghost">Toggle theme</button>
        <button id="clearBoardBtn" class="btn-danger-ghost">Clear board</button>
    </div>
    <div id="message-box" class="hidden absolute bottom-10 left-1/2 -translate-x-1/2 toast-pill z-30">
        <p>Click two notes to connect them.</p>
    </div>
    <div id="confirmation-modal" class="hidden fixed inset-0 modal-backdrop z-50 flex justify-center items-center">
        <div class="modal-card">
            <p id="modal-text" class="modal-text">Are you sure?</p>
            <div class="flex justify-end space-x-3">
                <button id="modal-cancel-btn" class="btn-secondary">Cancel</button>
                <button id="modal-confirm-btn" class="btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/board.js"></script>
</body>
</html>
